<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PISKU PRO — Activado ⚡</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&family=DM+Sans&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --bg:#070a0f; --cyan:#00e5ff; --green:#39ff14; --surface:#0d1117; --border:rgba(0,229,255,0.12); --muted:#5b6b7c; }
    body { background:var(--bg); color:#cdd9e5; font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; align-items:center; }
    h1 { font-family:'Syne',sans-serif; font-weight:800; font-size:2.5rem; }
    .key-box {
      background:var(--surface); border:1px solid var(--cyan);
      border-radius:8px; padding:1.5rem 2rem;
      font-family:'JetBrains Mono',monospace;
      font-size:1.1rem; color:var(--cyan); letter-spacing:0.1em;
      display:flex; align-items:center; justify-content:space-between; gap:1rem;
    }
    .copy-btn {
      background:var(--cyan); color:#000; border:none; padding:0.5rem 1rem;
      border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:0.8rem;
      cursor:pointer; white-space:nowrap; transition:opacity 0.2s;
    }
    .copy-btn:hover { opacity:0.85; }
    .cmd-box {
      background:var(--surface); border:1px solid var(--border);
      border-radius:6px; padding:1rem 1.25rem;
      font-family:'JetBrains Mono',monospace; font-size:0.85rem; color:var(--muted);
    }
    .cmd-box span { color:var(--cyan); }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-lg-6 text-center py-5">
      <div style="font-size:4rem; margin-bottom:1.5rem">⚡</div>
      <h1 style="color:#fff">PRO activado.</h1>
      <p style="color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:0.85rem; margin-bottom:2.5rem">
        Tu license key fue enviada por email. También podés copiarla acá:
      </p>

      <div class="key-box mb-4" id="keyBox">
        <span id="licenseKey">Cargando...</span>
        <button class="copy-btn" onclick="copyKey()">Copiar</button>
      </div>

      <div class="text-start mb-4">
        <p style="font-family:'JetBrains Mono',monospace; font-size:0.78rem; color:var(--muted); margin-bottom:0.75rem">
          Activá en tu terminal:
        </p>
        <div class="cmd-box">
          <span>pisku activate-pro</span> <span id="keyInCmd" style="color:#fff">PISKU-PRO-...</span>
        </div>
      </div>

      <a href="/" style="font-family:'JetBrains Mono',monospace; font-size:0.8rem; color:var(--muted); text-decoration:none">
        ← Volver al inicio
      </a>

      <div id="error" style="display:none; margin-top:2rem; font-family:'JetBrains Mono',monospace; font-size:0.8rem; color:#ff4d6d;"></div>
    </div>
  </div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get('session_id');

  async function loadLicense() {
    if (!sessionId) {
      document.getElementById('licenseKey').textContent = 'No se encontró la sesión.';
      return;
    }
    try {
      const res = await fetch(`/api/payments/success?session_id=${sessionId}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail);
      document.getElementById('licenseKey').textContent = data.license_key;
      document.getElementById('keyInCmd').textContent = data.license_key;
    } catch(e) {
      document.getElementById('error').textContent = `Error: ${e.message}`;
      document.getElementById('error').style.display = 'block';
    }
  }

  function copyKey() {
    const key = document.getElementById('licenseKey').textContent;
    navigator.clipboard.writeText(key);
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✓ Copiado';
    setTimeout(() => btn.textContent = 'Copiar', 2000);
  }

  loadLicense();
</script>
</body>
</html>
